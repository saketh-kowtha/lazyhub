name: Auto-Docs

on:
  workflow_dispatch:
    # Auto-generation via Gemini is temporarily disabled.
    # Re-enable by restoring the push trigger below:
    # push:
    #   branches: [main]

jobs:
  update-architecture:
    name: Update ARCHITECTURE.md
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update Architecture (AI)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          REPO: ${{ github.repository }}
        run: node .github/scripts/auto-docs.mjs

      - name: Commit AI changes to main
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: auto-update ARCHITECTURE.md (AI)"
          file_pattern: "ARCHITECTURE.md"
