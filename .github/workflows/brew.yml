name: Update Homebrew tap

on:
  release:
    types: [published]

jobs:
  brew:
    runs-on: ubuntu-latest
    steps:
      - name: Compute tarball SHA256
        id: sha
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          URL="https://registry.npmjs.org/lazyhub/-/lazyhub-${VERSION}.tgz"
          SHA=$(curl -sL "$URL" | sha256sum | awk '{print $1}')
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "url=${URL}" >> "$GITHUB_OUTPUT"

      - name: Push formula to homebrew-tap
        uses: actions/github-script@v7
        env:
          VERSION: ${{ steps.sha.outputs.version }}
          SHA256:  ${{ steps.sha.outputs.sha }}
          URL:     ${{ steps.sha.outputs.url }}
        with:
          github-token: ${{ secrets.TAP_TOKEN }}
          script: |
            const version = process.env.VERSION
            const sha256  = process.env.SHA256
            const url     = process.env.URL

            const formula = `class Lazyhub < Formula
              desc "Lazygit-style GitHub TUI — keyboard-driven terminal UI for GitHub"
              homepage "https://github.com/saketh-kowtha/lazyhub"
              url "${url}"
              sha256 "${sha256}"
              version "${version}"
              license "MIT"

              depends_on "node"

              def install
                system "npm", "install", *Language::Node.std_npm_install_args(libexec)
                bin.install_symlink Dir["#{libexec}/bin/*"]
              end

              test do
                assert_match "lazyhub", shell_output("#{bin}/lazyhub --version 2>&1", 1)
              end
            end
            `

            const owner = 'saketh-kowtha'
            const repo  = 'homebrew-tap'
            const path  = 'Formula/lazyhub.rb'

            let sha
            try {
              const { data } = await github.rest.repos.getContent({ owner, repo, path })
              sha = data.sha
            } catch {}

            await github.rest.repos.createOrUpdateFileContents({
              owner, repo, path,
              message: `lazyhub ${version}`,
              content: Buffer.from(formula).toString('base64'),
              sha,
            })
