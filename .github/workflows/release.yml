name: Release (Tag & Release)

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  tag:
    if: github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Get version from package.json
        id: pkg
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.pkg.outputs.version }}
        run: |
          # The prepare-release.mjs already updated CHANGELOG.md,
          # so we can just grab the latest entry for the release notes.
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes "Full release notes available in CHANGELOG.md" \
            --latest

      - name: Open sync PR (Release ← Main)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.pkg.outputs.version }}
        run: |
          # Open a PR to bring the post-release merge commit back into release.
          # Direct push is blocked by branch protection; a PR is the correct path.
          BRANCH="chore/sync-release-v${VERSION}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin release
          git checkout -b "$BRANCH" origin/main
          git push origin "$BRANCH"
          gh pr create \
            --title "chore: sync release ← main after v${VERSION}" \
            --body "Post-release sync: brings the release merge commit from \`main\` back into \`release\`. Safe to merge." \
            --base release \
            --head "$BRANCH" 2>/dev/null || echo "Sync PR already open — skipping"
